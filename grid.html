<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HK23 — THE GRID</title>
<meta name="description" content="Every world HK23 is building — live previews, one tap to enter.">
<meta property="og:title" content="HK23 — THE GRID">
<meta property="og:description" content="Every project, one grid. Live previews. Enter any world.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--bg:#06060a;--panel:#0c0c14;--line:rgba(255,255,255,.08);--red:#FF3A1F;--yel:#FFD200;--grn:#AAFF00;--pur:#9B5DE5;--mut:#7a7f8c;}
  html,body{background:var(--bg);color:#eee;font-family:'Space Mono',monospace;-webkit-font-smoothing:antialiased;}
  body{background-image:radial-gradient(circle at 50% -10%,rgba(255,58,31,.10),transparent 60%);min-height:100vh;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1340px;margin:0 auto;padding:30px 20px 80px;}

  /* header */
  .top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px;}
  .back{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mut);border:1px solid var(--line);
    border-radius:30px;padding:9px 16px;transition:.2s;display:inline-flex;gap:8px;align-items:center;}
  .back:hover{color:#fff;border-color:rgba(255,255,255,.3);}
  .kick{font-size:11px;letter-spacing:7px;color:var(--red);text-transform:uppercase;font-weight:700;}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:clamp(46px,11vw,120px);line-height:.86;letter-spacing:-3px;margin:14px 0 0;
    background:linear-gradient(180deg,#fff,#ff8a72);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .sub{margin-top:18px;font-size:13px;letter-spacing:1px;color:#9aa;max-width:560px;line-height:1.7;}
  .sub b{color:#fff;}

  /* filter + stats */
  .bar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin:34px 0 22px;
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:16px 0;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);background:rgba(255,255,255,.03);
    border:1px solid var(--line);border-radius:30px;padding:9px 16px;cursor:pointer;transition:.18s;font-family:inherit;}
  .chip:hover{color:#fff;border-color:rgba(255,255,255,.25);}
  .chip.on{color:#020207;background:#fff;border-color:#fff;font-weight:700;}
  .count{font-size:10px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;}
  .count b{color:#fff;font-family:'Space Grotesk',sans-serif;font-size:13px;}

  /* grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;
    transition:transform .25s cubic-bezier(.16,1,.3,1),border-color .25s,box-shadow .25s;display:flex;flex-direction:column;}
  .card:hover{transform:translateY(-5px);border-color:rgba(255,255,255,.22);}
  .card.live:hover{box-shadow:0 14px 50px -16px var(--accent);}
  .card .accent{position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);z-index:3;}

  /* preview */
  .frame{position:relative;height:186px;overflow:hidden;background:#000;border-bottom:1px solid var(--line);}
  .frame iframe{position:absolute;top:0;left:0;width:1280px;height:744px;border:0;transform:scale(.295);transform-origin:top left;pointer-events:none;background:#0a0a12;}
  .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 30% 20%,var(--accent),transparent 70%),#0a0a12;}
  .ph span{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:74px;color:rgba(255,255,255,.92);letter-spacing:-3px;}
  .glass{position:absolute;inset:0;z-index:2;}  /* catches clicks over the iframe */

  /* badges */
  .badge{position:absolute;top:12px;left:12px;z-index:4;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;
    padding:5px 10px;border-radius:30px;backdrop-filter:blur(6px);}
  .b-live{background:rgba(170,255,0,.16);color:#cdff7a;border:1px solid rgba(170,255,0,.4);}
  .b-build{background:rgba(255,210,0,.14);color:#ffe27a;border:1px solid rgba(255,210,0,.36);}
  .b-world{background:rgba(155,93,229,.18);color:#d7baff;border:1px solid rgba(155,93,229,.45);}
  .b-soon{background:rgba(255,255,255,.06);color:#aab;border:1px solid var(--line);}
  .pulse{display:inline-block;width:5px;height:5px;border-radius:50%;background:#AAFF00;margin-right:5px;vertical-align:1px;animation:pl 1.1s infinite alternate;}
  @keyframes pl{to{opacity:.25}}

  /* meta */
  .meta{padding:16px 16px 18px;display:flex;flex-direction:column;gap:7px;flex:1;}
  .nm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:#fff;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;}
  .nm .arr{margin-left:auto;color:var(--mut);transition:.2s;}
  .card:hover .nm .arr{color:var(--accent);transform:translateX(3px);}
  .tag{font-size:11.5px;color:#8d93a0;line-height:1.5;}
  .foot{margin-top:auto;padding-top:10px;display:flex;align-items:center;justify-content:space-between;}
  .url{font-size:10px;letter-spacing:.5px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:78%;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}

  .hide{display:none!important;}
  .footer{margin-top:50px;text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:900;letter-spacing:6px;color:var(--red);font-size:14px;}
  @media(max-width:560px){.grid{grid-template-columns:1fr;}.frame{height:200px;}.frame iframe{transform:scale(.32);}}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div>
      <div class="kick">HK23 · UNIVERSE</div>
    </div>
    <a class="back" href="cosmos.html">← back to the cosmos</a>
  </div>

  <h1>THE GRID</h1>
  <div class="sub">Every world I'm building — <b>live previews</b>, one tap to enter. The cosmos shows the orbit; the grid lets you walk in.</div>

  <div class="bar">
    <div class="chips" id="chips"></div>
    <div class="count" id="count"></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">NOT GIVEN. TAKEN.</div>
</div>

<script>
const PROJECTS = [
  // ── EL UNIVERSO (donde vive todo lo construido) ──
  { name:'HK23 Universe', tag:'El sistema operativo: galaxias + puertas (cada planeta abre su contenido), Dashboard, NeuralHub, Modo Juegos y Modo Manipular. Todo lo construido vive aquí.',
    url:'hk23-universe.html', status:'live', accent:'#FF3A1F' },

  // ── LIVE APPS ──
  { name:'VICE.HUB GTA6', tag:'Fan hub de GTA 6: money methods, crews, guías, easter eggs y vehículos. Experiencia del universo.',
    url:'vice-gta6.html', status:'live', accent:'#ff2e93' },
  { name:'ViceGolfer', tag:'Golf performance OS · torneos, putting, handicap engine. Your scratch-by-2030 system.',
    url:'https://vicegolfer.vercel.app/login', status:'live', accent:'#C6A15B' },
  { name:'ATLAS X', tag:'The sellable product — AI app on Vercel AI Gateway. Live on the free tier.',
    url:'https://atlas-x-app.vercel.app', status:'live', accent:'#00E5FF' },
  { name:'HK23 Cosmos', tag:'This universe — a living, Supabase-backed map of everything. You are here.',
    url:'cosmos.html', status:'world', accent:'#FF3A1F' },

  // ── WORLDS (single-page experiences) ──
  { name:'ViceGolfer House', tag:'The private performance house — blueprints, rooms, the home turned into a lab.',
    url:'vicegolfer-house-complete.html', status:'world', accent:'#C6A15B' },
  { name:'Performance Lab', tag:'Simulator studio brief — the physical Las Rocas vision, fully speced.',
    url:'performance-lab-brief.html', status:'world', accent:'#FF3A1F' },
  { name:'Multiverse', tag:'The wider HK23 multiverse — galaxies, systems, the whole map.',
    url:'multiverse.html', status:'world', accent:'#9B5DE5' },
  { name:'Command Center', tag:'Mission control — the operating dashboard for the whole ecosystem.',
    url:'command-center.html', status:'world', accent:'#AAFF00' },
  { name:'Mundial', tag:'The world view — global stage for the brand.',
    url:'mundial.html', status:'world', accent:'#FFD200' },
  { name:'Tournament Builder', tag:'ViceGolfer vs the $12M competitor — the comparison that sells the club deal.',
    url:'tournament-builder-comparison.html', status:'world', accent:'#C6A15B' },
  { name:'Putting Lab Blueprint', tag:'Architectural blueprint of the putting lab — Vice colors, real spec.',
    url:'putting-lab-blueprint.html', status:'world', accent:'#60a5fa' },

  // ── IN BUILD (not yet deployed) ──
  { name:'Casa OS', tag:'Household expenses + utility/meter tracker. Next.js + Supabase, English UI. Wired.',
    url:null, status:'build', accent:'#4ade80' },
  { name:'RUGBY VICE', tag:'Same platform, different sport — rugby performance MVP. Supabase-ready.',
    url:null, status:'build', accent:'#ef4444' },
  { name:'La Iglesia', tag:'Chilean gold exploration (IV Región, 3,676 ha) — data + investor materials.',
    url:null, status:'build', accent:'#FFD200' },
  { name:'Vice Seller', tag:'Autonomous Etsy / Printify / Pinterest agent. 926 prints, vision-curated.',
    url:null, status:'build', accent:'#FF3A1F' },
  { name:'Proof of Work', tag:'Art / merch / NFT from the Claude Code stats dashboard. Proof, taken.',
    url:null, status:'build', accent:'#AAFF00' },
  { name:'Vice OS', tag:'The second brain — lifelong Obsidian vault + agents running like departments.',
    url:null, status:'system', accent:'#9B5DE5' },
];

const FILTERS = [
  { id:'all',   label:'All' },
  { id:'live',  label:'Live' },
  { id:'world', label:'Worlds' },
  { id:'build', label:'In build' },
];
const BADGE = {
  live:'<span class="badge b-live"><span class="pulse"></span>Live</span>',
  world:'<span class="badge b-world">World</span>',
  build:'<span class="badge b-build">In build</span>',
  system:'<span class="badge b-soon">System</span>',
};
let active = 'all';

function matches(p){ return active==='all' || p.status===active || (active==='build' && p.status==='system'); }

function card(p){
  const has = !!p.url;
  const initial = p.name.replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase();
  const preview = has
    ? `<iframe src="${p.url}" loading="lazy" scrolling="no" tabindex="-1" title="${p.name} preview"></iframe>`
    : `<div class="ph"><span>${initial}</span></div>`;
  const tag = has ? 'a' : 'div';
  const href = has ? `href="${p.url}" ${p.url.startsWith('http')?'target="_blank" rel="noopener"':''}` : '';
  const urlLabel = has ? p.url.replace(/^https?:\/\//,'').replace(/\/.*/,'') : 'en construcción';
  return `<${tag} ${href} class="card ${p.status}" data-status="${p.status}" style="--accent:${p.accent}">
    <div class="accent"></div>
    ${BADGE[p.status]||''}
    <div class="frame">${preview}${has?'<div class="glass"></div>':''}</div>
    <div class="meta">
      <div class="nm">${p.name}${has?'<span class="arr">↗</span>':''}</div>
      <div class="tag">${p.tag}</div>
      <div class="foot"><span class="url">${urlLabel}</span><span class="dot"></span></div>
    </div>
  </${tag}>`;
}

function render(){
  const list = PROJECTS.filter(matches);
  document.getElementById('grid').innerHTML = list.map(card).join('');
  const live = PROJECTS.filter(p=>p.status==='live').length;
  document.getElementById('count').innerHTML = `<b>${list.length}</b> worlds · <b>${live}</b> live`;
}

function renderChips(){
  document.getElementById('chips').innerHTML = FILTERS.map(f=>{
    const n = f.id==='all'?PROJECTS.length:PROJECTS.filter(p=>p.status===f.id||(f.id==='build'&&p.status==='system')).length;
    return `<button class="chip ${f.id===active?'on':''}" data-f="${f.id}">${f.label} · ${n}</button>`;
  }).join('');
  document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{active=c.dataset.f;renderChips();render();});
}

renderChips();
render();
</script>
</body>
</html>
