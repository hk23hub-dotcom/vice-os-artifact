<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #020205; }
canvas { position: fixed; top: 0; left: 0; touch-action: none; }

/* ── HUD ── */
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  padding: env(safe-area-inset-top, 16px) 20px 0;
  padding-top: max(env(safe-area-inset-top), 14px);
  display: flex; justify-content: space-between; align-items: center;
  z-index: 10; pointer-events: none;
}
.hud-logo {
  font-family: 'Space Grotesk', system-ui; font-size: 15px;
  font-weight: 900; letter-spacing: 2px; color: #fff;
}
.hud-logo span { color: #FF3A1F; }
.hud-tag {
  font-family: 'Space Mono', monospace; font-size: 7px;
  letter-spacing: 3px; color: #333;
  border: 1px solid #1a1a1a; padding: 3px 8px;
}

/* ── Tap hint ── */
#tap-hint {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  font-family: 'Space Mono', monospace; font-size: 7px;
  letter-spacing: 4px; color: #2a2a3a; z-index: 10;
  pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
}
#tap-hint.hide { opacity: 0; }

/* ── Bottom drawer ── */
#drawer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #06060a;
  border-top: 1px solid #12121e;
  border-radius: 18px 18px 0 0;
  z-index: 20;
  transform: translateY(100%);
  transition: transform 0.36s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 72vh;
  display: flex; flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
#drawer.open { transform: translateY(0); }
#drawer.no-transition { transition: none; }

.drawer-handle-row {
  padding: 10px 0 6px; display: flex;
  justify-content: center; flex-shrink: 0; cursor: pointer;
}
.drawer-handle { width: 38px; height: 4px; background: #1e1e2a; border-radius: 2px; }

.drawer-scroll {
  overflow-y: auto; flex: 1; padding: 0 20px 28px;
  -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
}

/* ── Planet view ── */
.dv-color-bar { height: 2px; margin-bottom: 14px; border-radius: 1px; }
.dv-title {
  font-family: 'Space Grotesk', system-ui; font-size: 24px;
  font-weight: 900; letter-spacing: -0.5px; margin-bottom: 2px;
}
.dv-sub {
  font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 2px; color: #444; margin-bottom: 18px;
}
.dv-section {
  font-family: 'Space Mono', monospace; font-size: 7px;
  letter-spacing: 4px; color: #2e2e3e; margin-bottom: 8px;
}
.dv-module {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid #0e0e18;
}
.dv-module-left { flex: 1; min-width: 0; }
.dv-module-name {
  font-family: 'Space Grotesk', system-ui; font-size: 14px;
  font-weight: 700; color: #bbb; margin-bottom: 2px;
}
.dv-module-desc {
  font-family: 'Space Mono', monospace; font-size: 8px;
  color: #3a3a4a; line-height: 1.5; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.status-badge {
  font-family: 'Space Mono', monospace; font-size: 6px;
  letter-spacing: 2px; padding: 3px 7px; border: 1px solid;
  flex-shrink: 0; white-space: nowrap;
}
.status-badge.live { border-color: #AAFF0060; color: #AAFF00; }
.status-badge.build { border-color: #FF660060; color: #FF6600; }
.status-badge.soon { border-color: #2a2a3a; color: #444; }

/* ── Module detail view ── */
#module-view { display: none; }
#module-view.show { display: block; }
#planet-view.hidden { display: none; }

.mv-back {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 14px; margin-bottom: 12px;
  border-bottom: 1px solid #0e0e18; cursor: pointer;
}
.mv-back-icon { font-size: 12px; color: #333; }
.mv-back-label { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 3px; color: #333; }

.mv-eyebrow { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 4px; color: #333; margin-bottom: 6px; }
.mv-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
.mv-title { font-family: 'Space Grotesk', system-ui; font-size: 20px; font-weight: 900; letter-spacing: -0.3px; flex: 1; }
.mv-section { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 4px; color: #2e2e3e; margin: 14px 0 6px; }
.mv-desc { font-family: 'Space Grotesk', system-ui; font-size: 13px; color: #777; line-height: 1.65; }
.mv-howto {

  line-height: 1.7; border-left: 2px solid #12121e; padding-left: 10px;

.mv-benefits { list-style: none; display: flex; flex-direction: column; gap: 7px; }
.mv-benefits li {

.mv-benefits li .ben-dot { flex-shrink: 0; }

  letter-spacing: 3px; font-weight: 700; border: none; cursor: pointer;

.mv-cta-soon-label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; color: #444; margin-top: 18px; margin-bottom: 8px; }

.mv-email-input {

.mv-email-input::placeholder { color: #333; }
.mv-notify-btn {

.mv-reward { font-family: 'Space Mono', monospace; font-size: 7px; color: #2a2a3a; letter-spacing: 1px; margin-top: 10px; }

/* ── Special: IDEAS ── */

.ideas-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ideas-info { flex: 1; min-width: 0; }

.ideas-desc { font-family: 'Space Mono', monospace; font-size: 8px; color: #333; margin-top: 2px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ideas-arrow { color: #2a2a3a; font-size: 11px; flex-shrink: 0; }

/* ── Special: CMDS ── */
.cmds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 4px 0 8px; }
.cmds-card {
  background: #0a0a12; border: 1px solid #14141e;
  padding: 14px 12px; cursor: pointer; border-radius: 2px;
  display: flex; flex-direction: column; gap: 4px;

.cmds-card:active { background: #0f0f1c; }

.cmds-label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; color: #555; }
.cmds-sublabel { font-family: 'Space Mono', monospace; font-size: 7px; color: #2a2a3a; }

/* ── CMD toast ── */
#cmd-toast {
  position: fixed; top: 22px; left: 50%;
  transform: translateX(-50%) translateY(-12px);
  background: #080810; border: 1px solid #FF660080;
  font-family: 'Space Mono', monospace; font-size: 8px;
  letter-spacing: 3px; color: #FF6600; padding: 9px 18px;
  z-index: 100; white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
}
#cmd-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

  cmds: [
    { icon: '∅', label: 'BLACK HOLE', sub: 'Transmuta lo negativo', action: 'blackhole', col: '#FF3A1F' },
    { icon: '○', label: 'WHITE HOLE', sub: 'En build', action: 'wh', col: '#ffffff' },
    { icon: '◈', label: 'AGENTS', sub: 'Ver base', action: 'agents', col: '#00F0FF' },
    { icon: '◉', label: 'SWARM ART', sub: 'En build', action: 'swarm', col: '#B84DFF' },
  ],
};

const AGENT_BASE = {
  label: 'AGENT BASE', color: '#00F0FF', relX: 0.86, relY: 0.13, px:0, py:0,
  agents: [
    { label: 'VAULT AGENT',   col: '#B84DFF', angle: 0,    speed: 0.0009, px:0, py:0 },
    { label: 'CONTENT AGENT', col: '#00F0FF', angle: 2.1,  speed: 0.0007, px:0, py:0 },
    { label: 'DNA AGENT',     col: '#AAFF00', angle: 4.2,  speed: 0.0010, px:0, py:0 },
  ],
};

// Small nexus dots — no interaction, just visual
const NEXUS_DOTS = [
  { id: 'protocols', label: 'PROTOCOLS', col: '#FF6600', a: Math.PI * 0.52, speed: 0.00011 },
  { id: 'dna',       label: 'DNA',       col: '#AAFF00', a: Math.PI * 1.08, speed: 0.000095 },
  { id: 'rankings',  label: 'RANKINGS',  col: '#FFD200', a: Math.PI * 1.65, speed: 0.000115 },
  { id: 'content',   label: 'CONTENT',   col: '#00F0FF', a: Math.PI * 0.07, speed: 0.000085 },
  { id: 'vault',     label: 'VAULT',     col: '#B84DFF', a: Math.PI * 2.15, speed: 0.000075 },
  { id: 'market',    label: 'MARKET',    col: '#FFD200', a: Math.PI * 1.38, speed: 0.000068 },
].map(n => ({ ...n, px:0, py:0 }));

// ═══════════ CANVAS SETUP ═══════════
const canvas = document.getElementById('universe');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
let W, H, cx, cy, orbits;

function setupCanvas() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  cx = W * 0.5; cy = H * 0.40;
  const S = Math.min(W, H);
  orbits = { inner: S*0.19, nexus: S*0.28, outer: S*0.37, ideas: S*0.47 };
}
setupCanvas();
window.addEventListener('resize', () => { ctx.resetTransform(); setupCanvas(); });

// ── Stars (generated once) ──
const STARS = Array.from({length: 100}, () => ({
  x: Math.random(), y: Math.random(),
  sz: 0.4 + Math.random() * 1.1,
  a: 0.05 + Math.random() * 0.3,
}));

// ═══════════ STATE ═══════════
let t = 0;
let currentPlanetId = null;
let drawerState = 'closed'; // 'closed' | 'planet' | 'module'

// ═══════════ UPDATE POSITIONS ═══════════
function updatePositions() {
  const EY = 0.72;
  PLANETS.forEach(p => {
    p.a += p.speed;
    const r = orbits[p.orbit];
    p.px = cx + Math.cos(p.a) * r;
    p.py = cy + Math.sin(p.a) * r * EY;
  });
  NEXUS_DOTS.forEach(n => {
    n.a += n.speed;
    n.px = cx + Math.cos(n.a) * orbits.nexus;
    n.py = cy + Math.sin(n.a) * orbits.nexus * EY;
  });
  IDEAS_PLANET.a += IDEAS_PLANET.speed;
  IDEAS_PLANET.px = cx + Math.cos(IDEAS_PLANET.a) * orbits.ideas;
  IDEAS_PLANET.py = cy + Math.sin(IDEAS_PLANET.a) * orbits.ideas * EY;
  IDEAS_PLANET.iMoons.forEach(m => {
    m.a += m.speed;
    m.px = IDEAS_PLANET.px + Math.cos(m.a) * m.r;
    m.py = IDEAS_PLANET.py + Math.sin(m.a) * m.r * 0.65;
  });
  CMDS_PLANET.a += CMDS_PLANET.speed;
  CMDS_PLANET.px = cx + Math.cos(CMDS_PLANET.a) * orbits.nexus;
  CMDS_PLANET.py = cy + Math.sin(CMDS_PLANET.a) * orbits.nexus * EY;
  AGENT_BASE.px = W * AGENT_BASE.relX;
  AGENT_BASE.py = H * AGENT_BASE.relY;
  AGENT_BASE.agents.forEach(a => {
    a.angle += a.speed;
    a.px = AGENT_BASE.px + Math.cos(a.angle) * 22;
    a.py = AGENT_BASE.py + Math.sin(a.angle) * 10;
  });
}

// ═══════════ DRAW ═══════════
function drawStars() {
  STARS.forEach(s => {
    const tw = Math.sin(t * 0.8 + s.x * 20) * 0.5 + 0.5;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.sz, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a * (0.4 + tw * 0.6)})`;
    ctx.fill();
  });
}

function drawRings() {
  const EY = 0.72;
  [
    { r: orbits.inner, col: '#AAFF00' },
    { r: orbits.nexus, col: '#FF6600' },
    { r: orbits.outer, col: '#B84DFF' },
    { r: orbits.ideas, col: '#FFD200' },
  ].forEach(ring => {
    ctx.save();
    ctx.setLineDash([2, 12]);
    ctx.beginPath();
    ctx.ellipse(cx, cy, ring.r, ring.r * EY, 0, 0, Math.PI * 2);
    ctx.strokeStyle = ring.col + '10';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });
}

function drawNexusDots() {
  NEXUS_DOTS.forEach(n => {
    const pulse = Math.sin(t * 1.5 + n.a) * 1;
    const r = 4 + pulse * 0.4;
    const grd = ctx.createRadialGradient(n.px, n.py, 0, n.px, n.py, r * 4);
    grd.addColorStop(0, n.col + '20'); grd.addColorStop(1, n.col + '00');
    ctx.beginPath(); ctx.arc(n.px, n.py, r * 4, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();
    ctx.beginPath(); ctx.arc(n.px, n.py, r, 0, Math.PI * 2);
    ctx.fillStyle = n.col + '99'; ctx.fill();
  });
  // CMDS planet
  const { px, py, size, color } = CMDS_PLANET;
  const cp = Math.sin(t * 2) * 1;
  const cr = size + cp * 0.3;
  const cg = ctx.createRadialGradient(px, py, 0, px, py, cr * 4);
  cg.addColorStop(0, color + '25'); cg.addColorStop(1, color + '00');
  ctx.beginPath(); ctx.arc(px, py, cr * 4, 0, Math.PI * 2); ctx.fillStyle = cg; ctx.fill();
  const cb = ctx.createRadialGradient(px - cr*0.3, py - cr*0.3, 0, px, py, cr);
  cb.addColorStop(0, color + 'FF'); cb.addColorStop(1, color + '44');
  ctx.beginPath(); ctx.arc(px, py, cr, 0, Math.PI * 2); ctx.fillStyle = cb; ctx.fill();
  ctx.font = `700 5px 'Space Mono', monospace`;
  ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.textAlign = 'center';
  ctx.fillText('⌘', px, py + 2);
}

function drawPlanets() {
  PLANETS.forEach(p => {
    const { px, py, size, color, label } = p;
    const pulse = Math.sin(t * 0.9 + p.a * 3) * 2;
    const r = size + pulse * 0.4;
    // Glow
    const fg = ctx.createRadialGradient(px, py, 0, px, py, r * 5);
    fg.addColorStop(0, color + '18'); fg.addColorStop(1, color + '00');
    ctx.beginPath(); ctx.arc(px, py, r * 5, 0, Math.PI * 2); ctx.fillStyle = fg; ctx.fill();
    // Orbit ring
    ctx.beginPath(); ctx.arc(px, py, r + 8, 0, Math.PI * 2);
    ctx.strokeStyle = color + '20'; ctx.lineWidth = 0.5; ctx.stroke();
    // Body
    const bg = ctx.createRadialGradient(px - r*0.25, py - r*0.25, 0, px, py, r);
    bg.addColorStop(0, color + 'FF'); bg.addColorStop(0.5, color + 'CC'); bg.addColorStop(1, color + '44');
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fillStyle = bg; ctx.fill();
    // Label
    ctx.font = `900 ${Math.max(7, r * 0.55)}px 'Space Grotesk', system-ui`;
    ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.textAlign = 'center';
    const shortLabel = label.split(' ')[0]; // first word
    ctx.fillText(shortLabel, px, py + 3);
    // Sub below
    ctx.font = `400 6px 'Space Mono', monospace`;
    ctx.fillStyle = color + '70'; ctx.textAlign = 'center';
    ctx.fillText(label.split(' ').slice(1).join(' ') || label, px, py + r + 12);
  });
}

function drawIdeas() {
  const { px, py, size, color, iMoons } = IDEAS_PLANET;
  const pulse = Math.sin(t * 0.7) * 2;
  const r = size + pulse * 0.5;

  // Rings back half
  ctx.save(); ctx.translate(px, py);
  ctx.beginPath(); ctx.ellipse(0, r*0.25, r*2.4, r*0.52, 0, Math.PI, Math.PI*2);
  ctx.strokeStyle = color + '30'; ctx.lineWidth = 3; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0, r*0.15, r*1.85, r*0.38, 0, Math.PI, Math.PI*2);
  ctx.strokeStyle = color + '50'; ctx.lineWidth = 1.8; ctx.stroke();
  ctx.restore();

  // Glow
  const fg = ctx.createRadialGradient(px, py, 0, px, py, r * 6);
  fg.addColorStop(0, color + '15'); fg.addColorStop(1, color + '00');
  ctx.beginPath(); ctx.arc(px, py, r * 6, 0, Math.PI * 2); ctx.fillStyle = fg; ctx.fill();

  // Body
  const bg = ctx.createRadialGradient(px - r*0.25, py - r*0.3, 0, px, py, r);
  bg.addColorStop(0, color + 'FF'); bg.addColorStop(0.5, color + 'CC'); bg.addColorStop(1, color + '44');
  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fillStyle = bg; ctx.fill();
  ctx.font = `900 8px 'Space Grotesk', system-ui`;
  ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.textAlign = 'center'; ctx.fillText('IDEAS', px, py + 3);

  // Rings front half
  ctx.save(); ctx.translate(px, py);
  ctx.beginPath(); ctx.ellipse(0, r*0.25, r*2.4, r*0.52, 0, 0, Math.PI);
  ctx.strokeStyle = color + '55'; ctx.lineWidth = 3; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0, r*0.15, r*1.85, r*0.38, 0, 0, Math.PI);
  ctx.strokeStyle = color + '80'; ctx.lineWidth = 1.8; ctx.stroke();
  ctx.restore();

  // Sub label
  ctx.font = `400 6px 'Space Mono', monospace`;
  ctx.fillStyle = color + '60'; ctx.textAlign = 'center';
  ctx.fillText(IDEAS_PLANET.sub, px, py + r + 14);

  // Idea moons
  iMoons.forEach(m => {
    const mg = ctx.createRadialGradient(m.px, m.py, 0, m.px, m.py, m.sz * 3.5);
    mg.addColorStop(0, m.col + '30'); mg.addColorStop(1, m.col + '00');
    ctx.beginPath(); ctx.arc(m.px, m.py, m.sz * 3.5, 0, Math.PI * 2); ctx.fillStyle = mg; ctx.fill();
    ctx.beginPath(); ctx.arc(m.px, m.py, m.sz, 0, Math.PI * 2); ctx.fillStyle = m.col + 'BB'; ctx.fill();
  });
}

function drawAgentBase() {
  const { px, py, color, agents } = AGENT_BASE;
  const pulse = Math.sin(t * 1.1) * 1;
  const hex = 12 + pulse;

  // Glow
  const g = ctx.createRadialGradient(px, py, 0, px, py, 36);
  g.addColorStop(0, color + '15'); g.addColorStop(1, color + '00');
  ctx.beginPath(); ctx.arc(px, py, 36, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();

  // Hex
  ctx.save(); ctx.translate(px, py);
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI/3)*i - Math.PI/6;
    i === 0 ? ctx.moveTo(Math.cos(a)*hex, Math.sin(a)*hex) : ctx.lineTo(Math.cos(a)*hex, Math.sin(a)*hex);
  }
  ctx.closePath(); ctx.fillStyle = '#060612';
  ctx.fill(); ctx.strokeStyle = color + '55'; ctx.lineWidth = 0.8; ctx.stroke();
  ctx.restore();

  // Label
  ctx.font = `700 6px 'Space Mono', monospace`;
  ctx.fillStyle = color + '60'; ctx.textAlign = 'center';
  ctx.fillText('AGENT', px, py + hex + 11);
  ctx.fillText('BASE', px, py + hex + 20);

  // UFOs
  agents.forEach(a => {
    ctx.save(); ctx.translate(a.px, a.py);
    ctx.beginPath(); ctx.ellipse(0, 0, 5, 2, 0, 0, Math.PI*2);
    ctx.fillStyle = a.col + 'AA'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, -1.2, 2.5, 2.4, 0, Math.PI, Math.PI*2);
    ctx.fillStyle = a.col + '55'; ctx.fill();
    ctx.restore();
  });
}

function drawCenter() {
  const cr = 20 + Math.sin(t * 0.7) * 1.5;
  const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr * 5);
  cg.addColorStop(0, 'rgba(240,237,232,0.06)'); cg.addColorStop(1, 'rgba(240,237,232,0)');
  ctx.beginPath(); ctx.arc(cx, cy, cr * 5, 0, Math.PI * 2); ctx.fillStyle = cg; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, cr + 5, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 0.8; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2);
  ctx.fillStyle = '#0C0C0C'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.font = `700 11px 'Space Grotesk', system-ui`;
  ctx.fillStyle = 'rgba(240,237,232,0.55)'; ctx.textAlign = 'center';
  ctx.fillText('HK23', cx, cy + 4);
}

function animate() {
  t += 0.004;
  ctx.clearRect(0, 0, W, H);
  updatePositions();
  drawStars();
  drawRings();
  drawNexusDots();
  drawPlanets();
  drawIdeas();
  drawAgentBase();
  drawCenter();
  requestAnimationFrame(animate);
}
animate();

// ═══════════ HIT TEST ═══════════
function hitTest(tx, ty) {
  for (const p of PLANETS) {
    if (Math.hypot(tx - p.px, ty - p.py) < p.size + 22) return { type: 'planet', data: p };
  }
  if (Math.hypot(tx - IDEAS_PLANET.px, ty - IDEAS_PLANET.py) < IDEAS_PLANET.size + 22) return { type: 'ideas', data: IDEAS_PLANET };
  if (Math.hypot(tx - CMDS_PLANET.px, ty - CMDS_PLANET.py) < CMDS_PLANET.size + 20) return { type: 'cmds', data: CMDS_PLANET };
  if (Math.hypot(tx - AGENT_BASE.px, ty - AGENT_BASE.py) < 22) return { type: 'agents', data: AGENT_BASE };
  return null;
}

// ═══════════ DRAWER ═══════════
const drawer = document.getElementById('drawer');
const planetView = document.getElementById('planet-view');
const moduleView = document.getElementById('module-view');

function openPlanetDrawer(hit) {
  currentPlanetId = hit.type;
  document.getElementById('tap-hint').classList.add('hide');
  planetView.classList.remove('hidden');
  moduleView.classList.remove('show');
  drawerState = 'planet';

  if (hit.type === 'planet') {
    const p = hit.data;
    document.getElementById('dv-bar').style.background = p.color;
    document.getElementById('dv-title').textContent = p.label;
    document.getElementById('dv-title').style.color = p.color;
    document.getElementById('dv-sub').textContent = p.sub;
    document.getElementById('dv-section-label').textContent = 'MÓDULOS';
    document.getElementById('dv-content').innerHTML = p.modules.map((m, i) => `
      <div class="dv-module" onclick="openModuleDetail(${i},'${p.id}')">
        <div class="dv-module-left">
          <div class="dv-module-name">${m.label}</div>
          <div class="dv-module-desc">${m.sub}</div>
        </div>
        <div class="status-badge ${m.status}">${m.status === 'live' ? 'LIVE' : m.status === 'build' ? 'BUILD' : 'SOON'}</div>
      </div>
    `).join('');

  } else if (hit.type === 'ideas') {
    document.getElementById('dv-bar').style.background = '#FFD200';
    document.getElementById('dv-title').textContent = 'IDEAS';
    document.getElementById('dv-title').style.color = '#FFD200';
    document.getElementById('dv-sub').textContent = 'TODO LO QUE AÚN NO TIENE HOGAR';
    document.getElementById('dv-section-label').textContent = 'EN ÓRBITA';
    document.getElementById('dv-content').innerHTML = IDEAS_PLANET.ideas.map((idea, i) => `
      <div class="ideas-item" onclick="openIdeaDetail(${i})">
        <div class="ideas-dot" style="background:${idea.col}"></div>
        <div class="ideas-info">
          <div class="ideas-title">${idea.label}</div>
          <div class="ideas-desc">${idea.desc}</div>
        </div>
        <div class="ideas-arrow">→</div>
      </div>
    `).join('');

  } else if (hit.type === 'cmds') {
    document.getElementById('dv-bar').style.background = '#FF6600';
    document.getElementById('dv-title').textContent = 'CMDS';
    document.getElementById('dv-title').style.color = '#FF6600';
    document.getElementById('dv-sub').textContent = 'COMMAND CENTER';
    document.getElementById('dv-section-label').textContent = 'SHORTCUTS';
    document.getElementById('dv-content').innerHTML = `
      <div class="cmds-grid">
        ${CMDS_PLANET.cmds.map(c => `
          <div class="cmds-card" onclick="execCmd('${c.action}')">
            <div class="cmds-icon" style="color:${c.col}">${c.icon}</div>
            <div class="cmds-label" style="color:${c.col}">${c.label}</div>
            <div class="cmds-sublabel">${c.sub}</div>
          </div>
        `).join('')}
      </div>
    `;

  } else if (hit.type === 'agents') {
    document.getElementById('dv-bar').style.background = '#00F0FF';
    document.getElementById('dv-title').textContent = 'AGENT BASE';
    document.getElementById('dv-title').style.color = '#00F0FF';
    document.getElementById('dv-sub').textContent = '3 AGENTES DISPONIBLES — IDLE';
    document.getElementById('dv-section-label').textContent = 'AGENTES';
    document.getElementById('dv-content').innerHTML = `
      <div class="agents-list">
        ${AGENT_BASE.agents.map(a => `
          <div class="agent-row">
            <div class="agent-dot" style="background:${a.col}"></div>
            <div class="agent-info">
              <div class="agent-name">${a.label}</div>
              <div class="agent-status">● IDLE — BASE</div>
            </div>
            <button class="agent-assign">ASIGNAR →</button>
          </div>
        `).join('')}
      </div>
    `;
  }

  drawer.classList.add('open');
}

function openModuleDetail(idx, planetId) {
  const p = PLANETS.find(pl => pl.id === planetId);
  if (!p) return;
  const m = p.modules[idx];
  _showModuleDetail(m, p.label, p.color);
}

function openIdeaDetail(idx) {
  const idea = IDEAS_PLANET.ideas[idx];
  document.getElementById('mv-eyebrow').textContent = 'IDEA — UNIVERSO HK23';
  document.getElementById('mv-title').textContent = idea.label;
  document.getElementById('mv-title').style.color = idea.col;
  const statusEl = document.getElementById('mv-status');
  statusEl.textContent = 'IDEA EN ÓRBITA';
  statusEl.className = 'status-badge soon';
  document.getElementById('mv-desc').textContent = idea.desc;
  document.getElementById('mv-howto-wrap').style.display = 'none';
  document.getElementById('mv-benefits-wrap').style.display = 'none';
  document.getElementById('mv-cta').innerHTML = `
    <button onclick="showCmdToast('IDEA MARCADA PARA DESARROLLO ✦', '${idea.col}')" style="
      width:100%; margin-top:18px; padding:14px;

function _showModuleDetail(m, planetLabel, planetColor) {
  document.getElementById('mv-eyebrow').textContent = m.eyebrow || 'MÓDULO';
  document.getElementById('mv-title').textContent = m.label;
  document.getElementById('mv-title').style.color = planetColor;
  const statusEl = document.getElementById('mv-status');
  statusEl.textContent = m.status === 'live' ? 'LIVE' : m.status === 'build' ? 'EN BUILD' : 'PRÓXIMO';
  statusEl.className = 'status-badge ' + m.status;
  document.getElementById('mv-desc').textContent = m.desc;
  const howtoWrap = document.getElementById('mv-howto-wrap');
  if (m.howTo) { howtoWrap.style.display = ''; document.getElementById('mv-howto').textContent = m.howTo; }
  else howtoWrap.style.display = 'none';
  const benWrap = document.getElementById('mv-benefits-wrap');
  if (m.benefits && m.benefits.length) {
    benWrap.style.display = '';
    document.getElementById('mv-benefits').innerHTML = m.benefits.map(b =>
      `<li><span class="ben-dot" style="color:${planetColor}">▸</span>${b}</li>`
    ).join('');
  } else benWrap.style.display = 'none';
  if (m.status === 'live') {
    document.getElementById('mv-cta').innerHTML = `
      <a href="${m.link || '#'}" target="_blank" class="mv-cta-live"
        style="background:${planetColor};color:#080808">${m.action || 'ABRIR EN APP →'}</a>
    `;
  } else {
    document.getElementById('mv-cta').innerHTML = `
      <div class="mv-cta-soon-label">¿QUERÉS SER EL PRIMERO EN PROBARLO?</div>
      <div class="mv-email-row">
        <input type="email" class="mv-email-input" placeholder="tu@email.com">
        <button class="mv-notify-btn" style="border-color:${planetColor};color:${planetColor}">AVISAR →</button>
      </div>
      <div class="mv-reward">✦ Los aportes son premiados con descuentos y membresías de socio.</div>
    `;
  }
  document.getElementById('mv-back-label').textContent = planetLabel;
  document.getElementById('mv-back').onclick = backToPlanet;
  planetView.classList.add('hidden');
  moduleView.classList.add('show');
  drawerState = 'module';
  document.querySelector('.drawer-scroll').scrollTop = 0;
}

function backToPlanet() {
  moduleView.classList.remove('show');
  planetView.classList.remove('hidden');
  drawerState = 'planet';
  document.querySelector('.drawer-scroll').scrollTop = 0;
}

function closeDrawer() {
  drawer.classList.remove('open');
  drawerState = 'closed';
  setTimeout(() => {
    if (drawerState === 'closed') {
      moduleView.classList.remove('show');
      planetView.classList.remove('hidden');
      document.getElementById('tap-hint').classList.remove('hide');
    }
  }, 380);
}

function execCmd(action) {
  if (action === 'agents') { closeDrawer(); setTimeout(() => openPlanetDrawer({ type: 'agents', data: AGENT_BASE }), 50); }
  else if (action === 'blackhole') showCmdToast('∅ BLACK HOLE — EN BUILD', '#FF3A1F');
  else showCmdToast('⌘ ' + action.toUpperCase() + ' — EN BUILD', '#FF6600');
}

function showCmdToast(msg, col) {
  const toast = document.getElementById('cmd-toast');
  toast.textContent = msg;
  toast.style.color = col || '#FF6600';
  toast.style.borderColor = (col || '#FF6600') + '80';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// ═══════════ TOUCH EVENTS ═══════════
let tapStart = null;

canvas.addEventListener('touchstart', e => {
  const touch = e.changedTouches[0];
  tapStart = { x: touch.clientX, y: touch.clientY, t: Date.now() };
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (!tapStart) return;
  const touch = e.changedTouches[0];
  const dx = touch.clientX - tapStart.x;
  const dy = touch.clientY - tapStart.y;
  const dt = Date.now() - tapStart.t;
  tapStart = null;
  // Only fire for quick taps without much movement
  if (Math.hypot(dx, dy) > 14 || dt > 400) return;
  const hit = hitTest(touch.clientX, touch.clientY);
  if (hit) openPlanetDrawer(hit);
  else if (drawerState !== 'closed') closeDrawer();
}, { passive: true });

// Drawer drag to dismiss
let dragStart = null, dragCurrentY = 0;
const drawerHandle = document.getElementById('drawer-handle');

drawerHandle.addEventListener('touchstart', e => {
  dragStart = e.touches[0].clientY;
  dragCurrentY = 0;
  drawer.classList.add('no-transition');
}, { passive: true });

drawerHandle.addEventListener('touchmove', e => {
  if (!dragStart) return;
  const dy = e.touches[0].clientY - dragStart;
  if (dy > 0) { dragCurrentY = dy; drawer.style.transform = `translateY(${dy}px)`; }
}, { passive: true });

drawerHandle.addEventListener('touchend', () => {
  if (!dragStart) return;
  drawer.classList.remove('no-transition');
  if (dragCurrentY > 80) {
    drawer.style.transform = '';
    closeDrawer();
  } else {
    drawer.style.transform = '';
  }
  dragStart = null; dragCurrentY = 0;
}, { passive: true });
</script>
